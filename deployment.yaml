apiVersion: apps/v1
kind: Deployment

metadata:
  name: mon-app-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: mon-app

  template:
    metadata:
      labels:
        app: mon-app

    spec:
      containers:
        - name: mon-app
          image: jrrrrrr/mon-app-js:latest
          ports:
            - containerPort: 3000
